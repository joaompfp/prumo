[pytest]
# Pytest configuration for CAE Dashboard testing

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    integration: Integration tests (require DB/API)
    unit: Unit tests (no external dependencies)
    slow: Slow tests
    skipif: Tests that may be skipped in some environments

# Coverage
[coverage:run]
source = app
branch = true

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
