<!--
  Prumo PT — Watermark v0
  Marca d'água para canto inferior direito de gráficos exportados.
  Monospace discreto, muito baixa opacidade.
  Funciona sobre fundos claros e sobre gráficos com linhas coloridas.
  Max: 120×20px
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 20" width="120" height="20"
     fill="none" role="img" aria-label="prumo.pt watermark">

  <!-- Separador vertical (elemento de marca) -->
  <line x1="14" y1="4" x2="14" y2="16"
        stroke="#9CA3AF" stroke-width="0.8" opacity="0.4"/>

  <!-- Mini símbolo prumo (~10px altura, à esquerda) -->
  <rect x="8" y="4" width="12" height="1.5" fill="#9CA3AF" opacity="0.4"/>
  <line x1="14" y1="5.5" x2="14" y2="8" stroke="#9CA3AF" stroke-width="0.6" opacity="0.4"/>
  <polygon points="11,8 17,8 18,12 14,16 10,12" fill="none" stroke="#9CA3AF" stroke-width="0.7" opacity="0.4"/>

  <!-- Texto "prumo.pt" em monospace -->
  <text x="20" y="14"
        font-family="'Courier New', Courier, monospace"
        font-size="10"
        font-weight="400"
        letter-spacing="0.5"
        fill="#9CA3AF"
        opacity="0.4">prumo.pt</text>

</svg>
