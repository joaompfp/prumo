<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" fill="none">
  <!-- Prumo PT Logo — Variante B+C (fusão) -->

  <!-- Corda/fio topo -->
  <line x1="26" y1="4" x2="26" y2="14" stroke="#6B7B9A" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="26" cy="4" r="2" fill="none" stroke="#6B7B9A" stroke-width="1"/>

  <!-- Corpo rectangular navy -->
  <rect x="14" y="14" width="24" height="36" rx="2" ry="2" fill="#C0392B"/>

  <!-- Marcas de graduação técnicas -->
  <line x1="14" y1="20" x2="18" y2="20" stroke="#E07060" stroke-width="0.8"/>
  <line x1="14" y1="26" x2="20" y2="26" stroke="#E07060" stroke-width="0.8"/>
  <line x1="14" y1="32" x2="18" y2="32" stroke="#E07060" stroke-width="0.8"/>
  <line x1="14" y1="38" x2="20" y2="38" stroke="#E07060" stroke-width="0.8"/>
  <line x1="14" y1="44" x2="18" y2="44" stroke="#E07060" stroke-width="0.8"/>

  <!-- Sigma branco legivel -->
  <text x="26" y="37" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">&#x3A3;</text>

  <!-- Ponta conica base -->
  <polygon points="14,50 38,50 26,62" fill="#C0392B"/>

  <!-- Fio vertical descendo da ponta -->
  <line x1="26" y1="62" x2="26" y2="69" stroke="#CCCCCC" stroke-width="1" stroke-linecap="round"/>

  <!-- Linha horizontal ancora fio->wordmark -->
  <line x1="26" y1="69" x2="360" y2="69" stroke="#CCCCCC" stroke-width="0.7" stroke-linecap="round"/>

  <!-- "Prumo" serif bold cinza escuro -->
  <text x="52" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="bold" fill="#2C3E50">Prumo</text>

  <!-- "PT" serif bold vermelho — junto a "Prumo" -->
  <text x="174" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="bold" fill="#C0392B"> PT</text>

  <!-- Tagline — mais visível -->
  <text x="52" y="56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8.5" font-weight="400" fill="#6B7B8A" letter-spacing="2.5">ECONOMIA A R&#xC9;GUA E ESQUADRO</text>
</svg>
