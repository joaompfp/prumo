<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 96" fill="none">

  <!-- Símbolo (escala reduzida) — centrado verticalmente em y=48 -->
  <g transform="translate(48, 48) scale(0.42)">
    <!-- Pino -->
    <line x1="0" y1="-135" x2="0" y2="-118" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-138" r="4" fill="none" stroke="#64748B" stroke-width="2"/>
    <!-- Barra -->
    <rect x="-22" y="-118" width="44" height="5" rx="1" fill="#C0392B"/>
    <!-- Fio -->
    <line x1="0" y1="-113" x2="0" y2="-95" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Corpo -->
    <polygon points="0,-95 28,-95 34,-40 0,55 -34,-40 -28,-95"
             fill="white" stroke="#C0392B" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Σ -->
    <text x="0" y="-15" text-anchor="middle"
          font-family="Georgia, serif" font-size="52" font-weight="700"
          fill="#C0392B">Σ</text>
  </g>

  <!-- Separador vertical -->
  <line x1="84" y1="14" x2="84" y2="82"
        stroke="#E2E8F0" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="98" y="44"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="30" font-weight="800" letter-spacing="-0.5"
        fill="#1E293B">PRUMO</text>

  <text x="235" y="44"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="30" font-weight="800" letter-spacing="-0.5"
        fill="#C0392B"> PT</text>

  <!-- Tagline -->
  <text x="99" y="64"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="9.5" font-weight="400" letter-spacing="1.8"
        fill="#94A3B8">ECONOMIA A RÉGUA E ESQUADRO</text>

</svg>