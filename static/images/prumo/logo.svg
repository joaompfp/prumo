<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <style>
      .nm { font-family: 'Playfair Display', 'Lora', Georgia, serif; font-weight: 700; font-size: 34px; }
      .tg { font-family: 'Montserrat', 'Source Sans Pro', Arial, sans-serif; font-weight: 300; font-size: 7.5px; letter-spacing: 2.2px; fill: #A0A0A0; }
      .ic { font-family: Arial Narrow, Arial, sans-serif; font-weight: 700; font-size: 5px; fill: #CC2A2A; }
    </style>
  </defs>

  <!-- ── ÍCONE: Fio de prumo ───────────────────────────── -->
  <!-- Barra horizontal vermelha (travessa) -->
  <rect x="18" y="7" width="22" height="2.5" rx="0.8" fill="#CC2A2A"/>
  <!-- Fio vertical cinza -->
  <rect x="28.2" y="4" width="1.6" height="14" rx="0.5" fill="#9E9E9E"/>

  <!-- Corpo do prumo: pentágono invertido, contorno vermelho -->
  <!-- Pontos: topo-esq, topo-dir, ombro-dir, ponta-baixo, ombro-esq -->
  <polygon points="16,22  42,22  45,32  29,58  13,32"
           fill="none" stroke="#CC2A2A" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Termos económicos (pequenos, dentro) -->
  <text x="23" y="32" class="ic">PIB</text>
  <text x="18" y="40" class="ic">EUR</text>
  <text x="23" y="48" class="ic">IPC</text>

  <!-- ── SEPARADOR ──────────────────────────────────────── -->
  <line x1="58" y1="14" x2="58" y2="60" stroke="#CCCCCC" stroke-width="1"/>

  <!-- ── WORDMARK ───────────────────────────────────────── -->
  <text x="68" y="50" class="nm" fill="#3B4A5C">Prumo</text>
  <text x="224" y="50" class="nm" fill="#CC2A2A">PT</text>

  <!-- ── TAGLINE ─────────────────────────────────────────── -->
  <text x="69" y="62" class="tg">ECONOMIA A RÉGUA E ESQUADRO</text>
</svg>
