<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">

  <!-- Fundo branco implícito -->

  <!-- Símbolo prumo — centrado em x=250, topo y=60 -->
  <g transform="translate(250, 195)">
    <!-- Pino de suspensão -->
    <line x1="0" y1="-135" x2="0" y2="-118"
          stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-138" r="4"
            fill="none" stroke="#64748B" stroke-width="2"/>

    <!-- Barra horizontal -->
    <rect x="-22" y="-118" width="44" height="5" rx="1"
          fill="#C0392B"/>

    <!-- Fio -->
    <line x1="0" y1="-113" x2="0" y2="-95"
          stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Corpo pentagonal — wireframe -->
    <polygon points="0,-95 28,-95 34,-40 0,55 -34,-40 -28,-95"
             fill="white" stroke="#C0392B" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Σ dentro do corpo -->
    <text x="0" y="-15" text-anchor="middle"
          font-family="Georgia, serif" font-size="52" font-weight="700"
          fill="#C0392B">Σ</text>
  </g>

  <!-- Wordmark centrado -->
  <text x="250" y="340"
        text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="64" font-weight="800" letter-spacing="-1"
        fill="#1E293B">PRUMO</text>

  <text x="250" y="385"
        text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" letter-spacing="8"
        fill="#C0392B">PT</text>

  <!-- Tagline -->
  <text x="250" y="440"
        text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="400" letter-spacing="2.5"
        fill="#94A3B8">ECONOMIA A RÉGUA E ESQUADRO</text>

</svg>