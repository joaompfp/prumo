<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60">
  <!--
    Prumo PT — Background pattern tile 60×60
    Papel milimétrico de precisão técnica.
    Principal (60px): #CC0000 opacity 0.06, stroke 0.5px
    Secundário (15px): #9CA3AF opacity 0.04, stroke 0.3px
    Fundo: transparente/branco
  -->
  <!-- Linhas secundárias (15px) -->
  <line x1="15" y1="0" x2="15" y2="60" stroke="#9CA3AF" stroke-width="0.3" opacity="0.04"/>
  <line x1="30" y1="0" x2="30" y2="60" stroke="#9CA3AF" stroke-width="0.3" opacity="0.04"/>
  <line x1="45" y1="0" x2="45" y2="60" stroke="#9CA3AF" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="15" x2="60" y2="15" stroke="#9CA3AF" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="30" x2="60" y2="30" stroke="#9CA3AF" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="45" x2="60" y2="45" stroke="#9CA3AF" stroke-width="0.3" opacity="0.04"/>
  <!-- Linhas principais (tile edges = 60px) -->
  <line x1="0" y1="0" x2="60" y2="0" stroke="#CC0000" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="0" x2="0" y2="60" stroke="#CC0000" stroke-width="0.5" opacity="0.06"/>
</svg>