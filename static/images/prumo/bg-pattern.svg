<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <defs>
    <pattern id="smallGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <!-- Fine grid lines (1mm equivalent) -->
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#E8EDF2" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Small grid tiles -->
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <!-- Major cm lines (100px boundary) -->
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#D0D8E0" stroke-width="1"/>
      <!-- Mid lines at 50px -->
      <line x1="50" y1="0" x2="50" y2="100" stroke="#D8DFE8" stroke-width="0.7"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#D8DFE8" stroke-width="0.7"/>
    </pattern>
  </defs>
  <!-- Off-white base -->
  <rect width="100" height="100" fill="#FAFBFC"/>
  <!-- Apply pattern -->
  <rect width="100" height="100" fill="url(#grid)"/>
</svg>
