<!--
  Prumo PT — Logótipo Vertical (empilhado) v0
  Símbolo em cima, wordmark no centro, tagline em baixo
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 168" fill="none" role="img" aria-label="Prumo PT logótipo vertical">

  <!-- ── Símbolo (centrado em x=100) ───────────────────────── -->
  <g id="symbol" transform="translate(72, 4)">
    <rect id="crossbar"   x="14" y="8"    width="28" height="3"       fill="#CC0000"/>
    <rect id="pin"        x="26.5" y="5"  width="3"  height="6"       fill="#CC0000"/>
    <line id="string"     x1="28" y1="11" x2="28"    y2="23"
          stroke="#9CA3AF" stroke-width="1.2" stroke-linecap="round"/>
    <polygon id="plumb-body"
             points="18,23 38,23 41,42 28,70 15,42"  fill="#CC0000"/>
    <line id="reference-line"
          x1="28" y1="26" x2="28" y2="66"
          stroke="#8B0000" stroke-width="0.8" opacity="0.5"/>
    <circle id="tip-point" cx="28" cy="70" r="2.5"   fill="#8B0000"/>
  </g>

  <!-- Separador horizontal -->
  <line x1="36" y1="90" x2="164" y2="90"
        stroke="#9CA3AF" stroke-width="0.5" opacity="0.35"/>

  <!-- ── Wordmark: "Prumo" + "PT" centrados ────────────────── -->
  <!-- Truque: ambos num grupo, deslocados para ficarem centrados -->
  <g id="wordmark" transform="translate(28, 0)">
    <text x="0" y="120"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="30" font-weight="400" letter-spacing="-0.5"
          fill="#374151">Prumo</text>
    <text x="104" y="120"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="30" font-weight="700"
          fill="#CC0000">PT</text>
  </g>

  <!-- ── Tagline ────────────────────────────────────────────── -->
  <text x="100" y="143"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="8.5" letter-spacing="1.2"
        fill="#9CA3AF">ECONOMIA A RÉGUA E ESQUADRO</text>

</svg>
