<!--
  Prumo PT — Ícone "Análise" 24×24
  Série temporal económica + esquadro sobreposto.
  Verificação técnica de dados.
  Paleta: #CC0000 (série), #374151 (esquadro)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
     fill="none" role="img" aria-label="Análise">

  <!-- Série temporal económica (linha irregular, tipo gráfico real) -->
  <!-- Da esquerda para a direita, movimento errático mas com tendência -->
  <polyline
    points="2,17 5,12 8,15 11,9 14,13 17,7 22,10"
    stroke="#CC0000"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>

  <!-- Esquadro/régua (L invertido) — verificação técnica -->
  <!-- Braço vertical: canto inferior esquerdo -->
  <line x1="3" y1="6" x2="3" y2="21"
        stroke="#374151" stroke-width="1"
        stroke-linecap="round"/>

  <!-- Braço horizontal do esquadro -->
  <line x1="3" y1="21" x2="11" y2="21"
        stroke="#374151" stroke-width="1"
        stroke-linecap="round"/>

  <!-- Marca de ângulo recto (pequeno quadrado no canto) -->
  <polyline
    points="3,18 6,18 6,21"
    stroke="#374151" stroke-width="0.8"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none" opacity="0.6"/>

</svg>
