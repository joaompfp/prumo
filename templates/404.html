<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Prumo PT</title>
  <link rel="icon" type="image/svg+xml" href="{{ base_path }}/static/images/prumo/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ base_path }}/static/images/prumo/favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #b8860b;
      --card-bg: #fff;
      --border: #e5e2dd;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141414;
        --fg: #e8e6e3;
        --muted: #999;
        --accent: #d4a843;
        --card-bg: #1e1e1e;
        --border: #333;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-page {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: 7rem;
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
      opacity: 0.25;
      margin-bottom: 0.5rem;
    }
    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 0.75rem;
    }
    .error-detail {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .error-detail code {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.15em 0.4em;
      font-size: 0.85em;
    }
    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-actions a {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
      transition: opacity 0.15s;
    }
    .error-actions a:hover { opacity: 0.8; }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-secondary {
      background: var(--card-bg);
      color: var(--fg);
      border: 1px solid var(--border);
    }
    .error-brand {
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .error-brand strong {
      font-weight: 400;
      color: var(--fg);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Página não encontrada</h1>
    <p class="error-detail">
      O endereço <code>{{ path }}</code> não existe neste servidor.
      Se chegou aqui por um link externo, é possível que tenha sido alterado.
    </p>
    <div class="error-actions">
      <a href="{{ base_path }}/" class="btn-primary">Ir para o Prumo</a>
      <a href="{{ base_path }}/#explorador" class="btn-secondary">Explorar dados</a>
    </div>
    <p class="error-brand"><strong>Prumo PT</strong> — Dados. Contexto. Narrativas.</p>
  </div>
</body>
</html>
