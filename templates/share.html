<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <meta name="description" content="{{ og_description }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ canonical_url }}">
  <meta property="og:title" content="{{ og_title }}">
  <meta property="og:description" content="{{ og_description }}">
  <meta property="og:image" content="{{ og_image_url }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="pt_PT">
  <meta property="og:site_name" content="Prumo PT">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ og_title }}">
  <meta name="twitter:description" content="{{ og_description }}">
  <meta name="twitter:image" content="{{ og_image_url }}">
  <link rel="icon" type="image/svg+xml" href="/static/images/prumo/favicon.svg">
  <script>
    // JS redirect — crawlers (Twitter, Facebook, LinkedIn) don't execute JS,
    // so they read the OG meta tags above. Browsers redirect immediately.
    window.location.replace("{{ redirect_url }}");
  </script>
</head>
<body style="font-family:system-ui,sans-serif;max-width:600px;margin:40px auto;padding:20px;color:#333">
  <p>Redirecting to <a href="{{ redirect_url }}">Prumo PT</a>...</p>
</body>
</html>
